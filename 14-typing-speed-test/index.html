<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typing Speed Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Typing Speed Test</h1>

    <div id="quoteBox" class="quote-box">
      <!-- Random sentence will be inserted here by JS -->
    </div>

    <textarea id="typingArea" placeholder="Start typing here..." disabled></textarea>

    <div class="stats">
      <div class="stat">
        <span id="timer">60</span>
        <p>Seconds</p>
      </div>
      <div class="stat">
        <span id="wpm">0</span>
        <p>WPM</p>
      </div>
      <div class="stat">
        <span id="accuracy">100</span>
        <p>Accuracy %</p>
      </div>
    </div>

    <button id="restartBtn" onclick="restartTest()">Restart</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
