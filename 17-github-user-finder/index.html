<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub User Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>GitHub User Finder</h1>

    <div class="search-box">
      <input type="text" id="usernameInput" placeholder="Enter GitHub username">
      <button onclick="searchUser()">Search</button>
    </div>

    <p id="errorMsg" class="error hidden">User not found. Please check the username.</p>

    <div id="profileCard" class="profile-card hidden">
      <img id="avatar" src="" alt="Avatar">
      <h2 id="name"></h2>
      <p id="username" class="username"></p>
      <p id="bio" class="bio"></p>

      <div class="stats">
        <div class="stat">
          <span id="repos">0</span>
          <p>Repos</p>
        </div>
        <div class="stat">
          <span id="followers">0</span>
          <p>Followers</p>
        </div>
        <div class="stat">
          <span id="following">0</span>
          <p>Following</p>
        </div>
      </div>

      <div class="extra-info">
        <p id="location">📍 Not specified</p>
        <p id="joined">📅 Joined</p>
      </div>

      <a id="profileLink" href="#" target="_blank">View GitHub Profile</a>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
